<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viteshot</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        min-width: 0;
        min-height: 0;
        list-style: none;
      }

      :root {
        --bg: #021a1a;
        --bg-secondary: #042424;
        --card-bg: #062e2e;
        --card-border: #0d4a4a;
        --card-border-hover: #1a7a7a;
        --text-primary: #e0f5f5;
        --text-secondary: #5ac8c8;
        --text-muted: #2a7070;
        --accent: #2ce4f4;
        --accent-glow: rgba(44, 228, 244, 0.15);
        --header-bg: rgba(2, 26, 26, 0.85);
        --size-badge-bg: #083838;
        --size-badge-text: #4ab0b0;
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.5);
        --shadow-card-hover: 0 8px 40px rgba(0, 0, 0, 0.6);
        --preview-bg: #011414;
        color-scheme: dark;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      [data-theme="light"] {
        --bg: #f1f5f9;
        --bg-secondary: #e8edf5;
        --card-bg: #ffffff;
        --card-border: #e2e8f0;
        --card-border-hover: #94a3b8;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --accent: #008996;
        --accent-glow: rgba(0, 137, 150, 0.1);
        --header-bg: rgba(241, 245, 249, 0.85);
        --size-badge-bg: #f1f5f9;
        --size-badge-text: #64748b;
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.08);
        --shadow-card-hover: 0 8px 32px rgba(0, 0, 0, 0.15);
        --preview-bg: #e8edf5;
        color-scheme: light;
      }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        min-height: 100vh;
      }

      /* Header */
      .header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0 2rem;
        height: 60px;
        background: var(--header-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--card-border);
      }
      .header .left {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 1.25rem;
      }
      .header-logo {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .header-logo svg {
        width: 20px;
        height: 20px;
        color: var(--accent);
        flex-shrink: 0;
      }
      .header-logo h1 {
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text-primary);
      }
      .header-docs-link {
        font-size: 0.78rem;
        color: var(--text-secondary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--card-border);
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .header-docs-link:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-glow);
      }
      .header-docs-link svg {
        width: 11px;
        height: 11px;
        flex-shrink: 0;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .language-select {
        height: 32px;
        padding: 0 0.5rem;
        font-size: 0.78rem;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        color: var(--text-primary);
        cursor: pointer;
        transition: border-color 0.15s;
        outline: none;
      }
      .language-select:hover,
      .language-select:focus {
        border-color: var(--accent);
      }
      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        color: var(--text-secondary);
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        padding: 0;
      }
      .theme-toggle:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-glow);
      }
      .theme-toggle svg {
        width: 16px;
        height: 16px;
        pointer-events: none;
      }
      .theme-toggle > .light { display: none; }
      [data-theme="light"] .theme-toggle > .dark { display: none; }
      [data-theme="light"] .theme-toggle > .light { display: block; }

      /* Main */
      .app-body {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2.5rem 2rem 4rem;
      }
      .page-intro {
        margin-bottom: 2rem;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
      }
      .page-intro-title {
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text-primary);
      }
      .page-intro-count {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* Grid */
      .screenshots-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.25rem;
      }

      /* Card */
      .card {
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .card:hover {
        border-color: var(--card-border-hover);
        box-shadow: var(--shadow-card-hover);
        transform: translateY(-2px);
      }
      .card-preview {
        position: relative;
        height: 160px;
        background: var(--preview-bg);
        overflow: hidden;
        border-bottom: 1px solid var(--card-border);
        flex-shrink: 0;
      }
      .card-preview iframe {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        border: none;
        pointer-events: none;
      }
      .card-footer {
        padding: 0.85rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .card-name-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .card-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        text-decoration: none;
        transition: color 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card:hover .card-name {
        color: var(--accent);
      }
      .card-size-badge {
        font-size: 0.68rem;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        color: var(--size-badge-text);
        background: var(--size-badge-bg);
        padding: 0.15rem 0.4rem;
        border-radius: 5px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      /* Card hover expand button */
      .card-preview-expand {
        position: absolute;
        bottom: 0.5rem;
        right: 0.5rem;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.3rem 0.55rem;
        font-size: 0.7rem;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        cursor: pointer;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.15s, transform 0.15s;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .card-preview-expand svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
      }
      .card:hover .card-preview-expand {
        opacity: 1;
        transform: translateY(0);
      }
      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.82);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        opacity: 0;
        transition: opacity 0.2s;
        cursor: zoom-out;
      }
      .modal-overlay.visible {
        opacity: 1;
      }
      .modal-box {
        position: relative;
        display: flex;
        flex-direction: column;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0,0,0,0.7);
        max-width: calc(100vw - 3rem);
        max-height: calc(100vh - 3rem);
        cursor: default;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.65rem 0.9rem;
        border-bottom: 1px solid var(--card-border);
        gap: 1rem;
        flex-shrink: 0;
      }
      .modal-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .modal-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .modal-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid var(--card-border);
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        padding: 0;
        flex-shrink: 0;
      }
      .modal-close:hover {
        color: var(--text-primary);
        border-color: var(--card-border-hover);
        background: var(--size-badge-bg);
      }
      .modal-close svg {
        width: 14px;
        height: 14px;
      }
      .modal-iframe-wrapper {
        overflow: auto;
        flex: 1;
      }
      .modal-iframe-wrapper iframe {
        display: block;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/viteshot-assets/dashboard.ts"></script>
  </body>
</html>
